<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <title>受講生情報一覧</title>
</head>
<body>
<h1>受講生一覧</h1>
<table border ="1">
  <thead>
    <tr>
      <th>ID</th>
      <th>名前</th>
      <th>カナ名</th>
      <th>ニックネーム</th>
      <th>メールアドレス</th>
      <th>地域</th>
      <th>年齢</th>
      <th>性別</th>
      <th>備考</th>
    </tr>
  </thead>
  <tbody>
    <tr th:each="studentDetail : ${studentList}">
      <td th:text="${studentDetail.student.id}">S001</td>
      <td th:text="${studentDetail.student.name}">斎藤光</td>
      <td th:text="${studentDetail.student.kanaName}">SaitouHikaru</td>
      <td th:text="${studentDetail.student.nickname}">シバター</td>
      <td th:text="${studentDetail.student.email}">Shibatar@example.com</td>
      <td th:text="${studentDetail.student.area}">香川</td>
      <td th:text="${studentDetail.student.age}">36</td>
      <td th:text="${studentDetail.student.gender}">男性</td>
      <td th:text="${studentDetail.student.remark}">突然発作を起こします。</td>
    </tr>
  </tbody>
</table>
</body>
</html>
