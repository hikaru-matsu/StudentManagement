<!DOCTYPE html>
<html xmlns:th="http:/www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>受講生一覧</title>
</head>
<body>
<h1>受講生一覧</h1>
<table>
  <thead>
  <tr>
    <th>ID</th>
    <th>名前</th>
    <th>仮名</th>
    <th>ニックネーム</th>
    <th>メールアドレス</th>
    <th>地域</th>
    <th>年齢</th>
    <th>性別</th>
    <th>備考</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="studentDetail : ${studentList}">
    <td th:text="${studentDetail.student.id}">1</td>
    <td th:text="${studentDetail.student.name}">斎藤光</td>
    <td th:text="${studentDetail.student.kanaName}">サイトウヒカル</td>
    <td th:text="${studentDetail.student.nickname}">シバター</td>
    <td th:text="${studentDetail.student.email}">shibatar@example.com</td>
    <td th:text="${studentDetail.student.area}">香川県</td>
    <td th:text="${studentDetail.student.age}">36</td>
    <td th:text="${studentDetail.student.gender}">男</td>
    <td th:text="${studentDetail.student.remark}">特になし</td>
  </tr>
  </tbody>
</table>
</body>
</html>
